<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mon Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        nav {
            background: #2c3e50;
            padding: 1rem;
            position: sticky;
            top: 0;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: #1abc9c;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #2c3e50;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
        }
        .dropdown-content a {
            padding: 12px 16px;
            display: block;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        main {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 0.5rem;
            margin-top: 0;
        }
        /* Style du formulaire */
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #1abc9c;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        button:hover {
            background-color: #16a085;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li class="dropdown">
                <a href="apropos.html">À propos ▼</a>
                <div class="dropdown-content">
                    <a href="apropos.html#competences">Mes Compétences</a>
                    <a href="apropos.html#cv">Mon CV</a>
                </div>
            </li>
            <li><a href="tableau.html">Tableau de compétences</a></li>
            <li><a href="projets.html">Mes Projets</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <div class="container">
            <h2>Me Contacter</h2>
            <p>Une question ou une opportunité de stage ? N'hésitez pas à m'envoyer un message !</p>
            
            <form>
                <div class="form-group">
                    <label for="name">Nom / Prénom :</label>
                    <input type="text" id="name" required placeholder="Votre nom">
                </div>
                <div class="form-group">
                    <label for="email">Adresse Email :</label>
                    <input type="email" id="email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message :</label>
                    <textarea id="message" rows="5" required placeholder="Votre message ici..."></textarea>
                </div>
                <button type="submit">Envoyer</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 Nesrine - Tous droits réservés</p>
    </footer>

</body>
</html>
